                type: UNAUTHORIZED
                message: "Unauthorized - Authentication required"
                details: "Please provide valid authentication credentials."
        '403':
          description: Forbidden - Employee rights required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
