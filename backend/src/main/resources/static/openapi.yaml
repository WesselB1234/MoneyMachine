                type: FORBIDDEN
                message: "Forbidden - Insufficient permissions"
                details: "You do not have the required permissions to access this resource."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Internal Server Error - An unexpected error occurred"
                details: "Please try again later or contact support if the problem persists."
    post:
      tags:
        - BankAccounts
      summary: Create a bank account for a user
      description: Creates a new bank account for the selected user.
      operationId: createBankAccount
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user who will own the bank account
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountCreationRequest'
      responses:
        '201':
          description: Successful operation - Bank account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountCreatedResponse'
        '400':
          description: Bad Request - Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
