components:
  schemas:
    UserResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          example: john.doe@example.com
        bsn:
          type: string
          example: "123456789"
        phoneNumber:
          type: string
          example: "+31612345678"
        role:
          type: string
          enum: [CUSTOMER, EMPLOYEE]
          example: CUSTOMER
        isActive:
          type: boolean
          example: true
        isApproved:
          type: boolean
          example: true

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: "secret123"
        loginType:
          type: string
          enum: [ATM, WEBSITE]
          example: "ATM"

    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          example: john.doe@example.com
        bsn:
          type: string
          example: "123456789"
        phoneNumber:
          type: string
          example: "+31612345678"

    DepositRequest:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          example: 50.00
        toIban:
          type: string
          example: NL91ABNA0417164300

    WithdrawRequest:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          example: 50.00
        fromIban:
          type: string
          example: NL91ABNA0417164300
    
    TransferRequest:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          example: 50.00
        toIban:
          type: string
          example: NL91ABNA0417164300
        fromIban:
          type: string
          example: NL91ABNA0417164300
        message:
          type: string
          example: Transfer request message

    ErrorResponse:
      type: object
      required:
        - code
        - type
        - message
      properties:
        code:
          type: integer
        type:
          type: string
          example: "BAD_REQUEST"
        message:
          type: string
          example: "Bad Request - Invalid input parameters"

    LoginResponse:
      type: object
      properties:
        authToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...        

    TransactionResponse:
      type: object
      properties:
        transactionId:
          type: integer
          example: 1
        initiatingUserId:
          type: integer
          example: 2
        fromAccountIban: 
          type: string
          example: "NL91ABNA0417164300"
        toAccountIban:
          type: string
          example: "NL91ABNA0417164300"
          description: The IBAN of the account the funds are transferred to
        message:
          type: string
          example: "Bought a car"
          description: Displays why the transaction was made
        amount: 
          type: number
          format: decimal
          example: 50
        dateTime: 
          type: string
          format: date-time
          example: "2026-11-24T14:45:12Z"

    WithdrawTransactionResponse:
      type: object
      properties:
        transactionId:
          type: integer
          example: 1
        initiatingUserId:
          type: integer
          example: 2
        fromAccountIban: 
          type: string
          example: "NL91ABNA0417164300"
        message:
          type: string
          example: "ATM withdraw"
          description: Displays why the transaction was made
        amount: 
          type: number
          format: decimal
          example: 50
        dateTime: 
          type: string
          format: date-time
          example: "2026-11-24T14:45:12Z"
    
    DepositTransactionResponse:
      type: object
      properties:
        transactionId:
          type: integer
          example: 1
        initiatingUserId:
          type: integer
          example: 2
        toAccountIban:
          type: string
          example: "NL91ABNA0417164300"
          description: The IBAN of the account the funds were deposited into
        message:
          type: string
          example: "ATM deposit"
          description: Displays why the transaction was made
        amount: 
          type: number
          format: decimal
          example: 50
        dateTime: 
          type: string
          format: date-time
          example: "2026-11-24T14:45:12Z"

    BankAccountResponse:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
        userId:
          type: integer
          example: 1
        bankAccountType:
          type: string
          enum: [checking, savings]
          example: checking
        balance:
          type: number
          format: decimal
          example: 1500.00
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
        isActive:
          type: boolean
          example: true

    BankAccountCreationRequest:
      type: object
      required:
        - iban
        - userId
        - bankAccountType
        - balance
        - singleTransferLimit
        - dailyTransferLimit
        - absoluteLimit
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
          description: International Bank Account Number
        userId:
          type: integer
          example: 1
          description: The ID of the user who will own the bank account
        bankAccountType:
          type: string
          enum: [checking, savings]
          example: checking
          description: Type of bank account
        balance:
          type: number
          format: decimal
          example: 1000.00
          description: Initial balance for the account
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
          description: Maximum amount allowed for a single transfer
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
          description: Maximum total amount that can be transferred in a single day
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
          description: The minimum allowed balance (overdraft limit) for the account

    BankAccountCreatedResponse:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
        userId:
          type: integer
          example: 1
        bankAccountType:
          type: string
          enum: [checking, savings]
          example: checking
        balance:
          type: number
          format: decimal
          example: 1000.00
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2024-04-28T10:30:00Z"

    BankAccountPatchRequest:
      type: object
      properties:
        isActive:
          type: boolean
          example: false
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
          description: Maximum amount allowed for a single transfer
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
          description: Maximum total amount that can be transferred in a single day
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
          description: The minimum allowed balance (overdraft limit) for the account
    
    IbanLookupResponse:
      type: object
      description: IBAN lookup response for users
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        iban:
          type: string
          example: NL91INHO0123456789

    UserOverviewResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    BankAccountOverviewResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BankAccountResponse'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    TransactionOverviewResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    IbanLookupOverviewResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IbanLookupResponse'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    RegisterResponse:
      type: object
      properties:
        user: 
          $ref: '#/components/schemas/UserResponse'
        authToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

  securitySchemes:
    bearerAuth:            
      type: http
      scheme: bearer
      bearerFormat: JWT