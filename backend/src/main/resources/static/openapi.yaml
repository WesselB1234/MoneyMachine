  /transactions:
    get:
      tags:
        - Transactions
      summary: Get all transactions for the authenticated user
      description: Returns a list of all transactions across all bank accounts owned by the currently logged in user
      operationId: getUserTransactions
      parameters:
      - name: lessThan
        in: query
        required: false
        description: Filter transactions with an amount less than this value
        schema:
          type: number
          format: decimal
          example: 500.00
      - name: greaterThan
        in: query
        required: false
        description: Filter transactions with an amount greater than this value
        schema:
          type: number
          format: decimal
          example: 100.00
      - name: equalTo
        in: query
        required: false
        description: Filter transactions with an amount equal to this value
        schema:
          type: number
          format: decimal
          example: 250.00
      - name: fromIban
        in: query
        required: false
        description: Filter transactions by a specific IBAN by me
        schema:
          type: string
          example: NL91ABNA0417164300
      - name: toIban
        in: query
        required: false
        description: Filter transactions by a specific IBAN to someone else
        schema:
          type: string
          example: NL91ABNA0417164300
      - name: page
        in: query
        required: false
        description: Get paginated page
        schema:
          type: number
          format: int
          example: 2
      responses:
        '200':
          description: Successful operation - Transactions retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Unauthorized - Authentication required"
                details: "Please provide valid authentication credentials."
        '404':
          description: Not Found - No transactions found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "Not Found - Requested resource does not exist"
                details: "The requested resource could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Internal Server Error - An unexpected error occurred"
                details: "Please try again later or contact support if the problem persists."

