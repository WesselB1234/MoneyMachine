        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Internal Server Error - An unexpected error occurred"
                details: "Please try again later or contact support if the problem persists."
  /transactions/transfer:
    post:
      tags:
        - Transactions
      summary: Transfer money from a user's bank account
      description: Transfers money from the specified bank account to another account
      operationId: userTransfer
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the source bank account
          schema:
            type: string
            example: NL91ABNA0417164300
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Successful operation - Transfer completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Bad Request - Invalid amount or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "Bad Request - Invalid input parameters"
                details: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Unauthorized - Authentication required"
                details: "Please provide valid authentication credentials."
        '404':
          description: Not Found - Bank account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "Not Found - Requested resource does not exist"
                details: "The requested resource could not be found."
        '422':
          description: Unprocessable Entity - Insufficient funds or limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 422
                type: UNPROCESSABLE_ENTITY
                message: "Unprocessable Entity - Invalid data or business rule violation"
                details: "The provided data violates business rules or constraints."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Internal Server Error - An unexpected error occurred"
                details: "Please try again later or contact support if the problem persists."

  /users/{user_id}/bank-accounts:
    get:
      tags:
        - Users
      summary: Get all bank accounts owned by the authenticated user
      description: Returns a list of bank accounts belonging to the currently logged in user
      operationId: getUserBankAccounts
