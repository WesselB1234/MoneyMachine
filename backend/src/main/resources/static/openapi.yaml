openapi: 3.0.3
info:
  title: MoneyMachine - Project 2.4 (Code Generation)
  description: |

    Welcome to the **MoneyMachine** API. This project was made for the second year **InHolland - code generation course**. This documentation follows the **OpenAPI 3.0 Specification** and was built with a design-first approach.

    ### Key Features:
    * **RESTful Endpoints:** Predictable, resource-oriented URLs.
    * **Secure-by-Design:** All endpoints (except public info) require Authentication.
    * **Consistency:** Standardized error responses (400, 401, 404, 500).
    
    ### Contact & Support:
    For internal development support, contact the Project 2.4 Dev Team
    - [Wessel Beun (729848)](mailto:729848@student.inholland.nl)
    - [Chris Lommerse (728158)](mailto:728158@student.inholland.nl)
    - [Adam Nasser (717582)](mailto:717582@student.inholland.nl.)
    - [Menno de Wever (728950)](mailto:728950@student.inholland.nl)

    View our Github Repository: [The MoneyMachine repository](https://github.com/Chris-17Lommerse/MoneyMachine)

  termsOfService: https://swagger.io/terms/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
  - url: https://moneymachine-1ifn.onrender.com/swagger-ui/index.html#/ATM/atmDeposit
    description: Production server (OAS 3.2)
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Operations about authentication
  - name: Users
    description: Operations about user management
  - name: Transactions
    description: Operations about recording transactions within the application
  - name: BankAccounts
    description: Operations for managing bankaccounts
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in to the system
      description: Verifies the provided email and password and returns a JWT bearer token on success. Access | Public to everyone
      security: []
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
                $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Successful operation - Returns authToken
          headers:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request - Invalid username or password supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user account
      description: Creates a new user account. Access | Public to everyone
      security: []
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully while returning authToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get the authenticated user's profile
      description: Returns the full profile details of the currently logged in user. Access | User and Employee
      operationId: getMyAccount
      responses:
        '200':
          description: Successful operation - User profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - Authenticated user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested resource could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /users:
    get:
      tags:
        - Users
      summary: Get all registered users
      description: Returns a list of registered users. Can be filtered by approval status. Access | Employee
      operationId: getUsers
      parameters:
        - name: isApproved
          in: query
          description: Filter users by their approval status
          required: false   
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          description: Page number for paginated results. Defaults to 1 if not provided.
          schema:
            type: number
            format: int
            example: 2
        - name: pageSize
          in: query
          required: false
          description: Number of results to return per page. Defaults to 20 if not provided.
          schema:
            type: integer
            format: int
            example: 20
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOverviewResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /transactions/transfer:
    post:
      tags:
        - Transactions
      summary: Transfer money between bank accounts
      description: Transfers a specified amount from one bank account to another. Both the source IBAN (fromIban) and destination IBAN (toIban) are provided in the request body. Access | User (can only select own source IBANs.) and Employee (can select all source IBANs.)
      operationId: userTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Successful operation - Transfer completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Bad Request - Invalid amount or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - One or both bank accounts not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested resource could not be found."
        '422':
          description: Unprocessable Entity - Insufficient funds or transfer limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 422
                type: UNPROCESSABLE_ENTITY
                message: "The provided data violates business rules or constraints."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /users/{user_id}/bank-accounts:
    get:
      tags:
        - Users
      summary: Get all bank accounts for a specific user
      description: Returns a list of bank accounts belonging to the user identified by the given user_id in the path.  Access | User (only own bank accounts) and Employee (all bank accounts of all users)
      operationId: getUserBankAccounts
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID of the user whose bank accounts to retrieve
          schema:
            type: integer
            format: int64
            example: 1
        - name: page
          in: query
          required: false
          description: Page number for paginated results. Defaults to 1 if not provided.
          schema:
            type: number
            format: int
            example: 2
        - name: pageSize
          in: query
          required: false
          description: Number of results to return per page. Defaults to 20 if not provided.
          schema:
            type: integer
            format: int
            example: 20
      responses:
        '200':
          description: Successful operation - Bank accounts retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccountOverviewResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - User not found or no bank accounts found for this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested resource could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /users/{user_id}:
    patch:
      tags:
        - Users
      summary: Update a user's information
      description: >
        Updates the user identified by the given user_id. Any type of requestBody
        can be provided to update specific user fields, such as approval status,
        role, or personal information. Access | User (only own user account) and Employee (all user accounts) 
      operationId: updateUser
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID of the user to update
          schema:
            type: integer
            format: int64
            example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountPatchRequest'
      responses:
        '204':
          description: Successful operation - User updated; returns the updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad Request - Invalid request parameters or user_id format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - No user found with the given ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested user could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /users/{user_id}/transactions:
    get:
      tags:
        - Users
      summary: Get all transactions by user
      description: Returns a paginated list of all transactions by user. Supports filtering by amount and by source or destination IBAN. Access | User (only own transactions) and Employee (all transactions of all users)
      operationId: getUserTransactions
      parameters:
        - name: user_id
          in: path
          required: true
          description: The ID of the user whose bank accounts to retrieve
          schema:
            type: integer
            format: int64
            example: 1
        - name: lessThan
          in: query
          required: false
          description: Filter transactions with an amount less than this value
          schema:
            type: number
            format: decimal
            example: 500.00
        - name: greaterThan
          in: query
          required: false
          description: Filter transactions with an amount greater than this value
          schema:
            type: number
            format: decimal
            example: 100.00
        - name: equalTo
          in: query
          required: false
          description: Filter transactions with an amount exactly equal to this value
          schema:
            type: number
            format: decimal
            example: 250.00
        - name: fromIban
          in: query
          required: false
          description: Filter transactions sent from this IBAN
          schema:
            type: string
            example: NL91ABNA0417164300
        - name: toIban
          in: query
          required: false
          description: Filter transactions sent to this IBAN
          schema:
            type: string
            example: NL91ABNA0417164300
        - name: startDate
          in: query
          required: false
          description: Filter transactions on or after this date
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: endDate
          in: query
          required: false
          description: Filter transactions on or before this date
          schema:
            type: string
            format: date
            example: "2026-12-31"
        - name: page
          in: query
          required: false
          description: Page number for paginated results. Defaults to 1 if not provided.
          schema:
            type: number
            format: int
            example: 2
        - name: pageSize
          in: query
          required: false
          description: Number of results to return per page. Defaults to 20 if not provided.
          schema:
            type: integer
            format: int
            example: 20
      responses:
        '200':
          description: Successful operation - Transactions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionOverviewResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - No transactions found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested resource could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /transactions:
    get:
      tags:
        - Transactions
      summary: Get all transactions of all users
      description: Returns a paginated list of all transactions across all users. Supports filtering by amount and by source or destination IBAN. Access | Employee
      operationId: getTransactions
      parameters:
      - name: lessThan
        in: query
        required: false
        description: Filter transactions with an amount less than this value
        schema:
          type: number
          format: decimal
          example: 500.00
      - name: greaterThan
        in: query
        required: false
        description: Filter transactions with an amount greater than this value
        schema:
          type: number
          format: decimal
          example: 100.00
      - name: equalTo
        in: query
        required: false
        description: Filter transactions with an amount exactly equal to this value
        schema:
          type: number
          format: decimal
          example: 250.00
      - name: fromIban
        in: query
        required: false
        description: Filter transactions sent from this IBAN
        schema:
          type: string
          example: NL91ABNA0417164300
      - name: toIban
        in: query
        required: false
        description: Filter transactions sent to this IBAN
        schema:
          type: string
          example: NL91ABNA0417164300
      - name: startDate
        in: query
        required: false
        description: Filter transactions on or after this date
        schema:
          type: string
          format: date
          example: "2026-01-01"
      - name: endDate
        in: query
        required: false
        description: Filter transactions on or before this date
        schema:
          type: string
          format: date
          example: "2026-12-31"
      - name: page
        in: query
        required: false
        description: Page number for paginated results. Defaults to 1 if not provided.
        schema:
          type: number
          format: int
          example: 2
      - name: pageSize
        in: query
        required: false
        description: Number of results to return per page. Defaults to 20 if not provided.
        schema:
          type: integer
          format: int
          example: 20
      responses:
        '200':
          description: Successful operation - Transactions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionOverviewResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - No transactions found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested resource could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /bank-accounts/{iban}/transactions:
    get:
      tags:
        - BankAccounts
      summary: Get all transactions for a specific bank account
      description: Returns all transactions (both incoming and outgoing) for the bank account identified by the given IBAN. Access | User (only own bank accounts) and Employee (all bank accounts)
      operationId: getTransactionsByIban
      parameters:
        - name: iban
          in: path
          description: The IBAN of the bank account whose transactions to retrieve
          required: true
          schema:
            type: string
            example: NL91ABNA0417164300
        - name: lessThan
          in: query
          required: false
          description: Filter transactions with an amount less than this value
          schema:
            type: number
            format: decimal
            example: 500.00
        - name: greaterThan
          in: query
          required: false
          description: Filter transactions with an amount greater than this value
          schema:
            type: number
            format: decimal
            example: 100.00
        - name: equalTo
          in: query
          required: false
          description: Filter transactions with an amount exactly equal to this value
          schema:
            type: number
            format: decimal
            example: 250.00
        - name: fromIban
          in: query
          required: false
          description: Filter transactions sent from this IBAN
          schema:
            type: string
            example: NL91ABNA0417164300
        - name: toIban
          in: query
          required: false
          description: Filter transactions sent to this IBAN
          schema:
            type: string
            example: NL91ABNA0417164300
        - name: startDate
          in: query
          required: false
          description: Filter transactions on or after this date
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: endDate
          in: query
          required: false
          description: Filter transactions on or before this date
          schema:
            type: string
            format: date
            example: "2026-12-31"
        - name: page
          in: query
          required: false
          description: Page number for paginated results. Defaults to 1 if not provided.
          schema:
            type: number
            format: int
            example: 2
        - name: pageSize
          in: query
          required: false
          description: Number of results to return per page. Defaults to 20 if not provided.
          schema:
            type: integer
            format: int
            example: 20
      responses:
        '200':
          description: Successful operation - Transactions retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionOverviewResponse'
        '400':
          description: Bad Request - Invalid IBAN format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - Bank account not found or no transactions found for this account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "The requested resource could not be found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /bank-accounts/iban-lookup:
    get:
      tags:
        - BankAccounts
      summary: Look up a users's IBAN by name
      description: >
        Allows users to look up the IBAN of another user's checking account
        using first and last name. Access | User and Employee
      operationId: lookupIbanByName
      parameters:
        - name: firstName
          in: query
          required: true
          description: The first name of the user whose IBAN is being searched
          schema:
            type: string
            example: John
        - name: lastName
          in: query
          required: true
          description: The last name of the user whose IBAN is being searched
          schema:
            type: string
            example: Doe
        - name: page
          in: query
          required: false
          description: Page number for paginated results. Defaults to 1 if not provided.
          schema:
            type: number
            format: int
            example: 2
        - name: pageSize
          in: query
          required: false
          description: Number of results to return per page. Defaults to 20 if not provided.
          schema:
            type: integer
            format: int
            example: 20
      responses:
        '200':
          description: Successful operation - Matching IBANs retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IbanLookupOverviewResponse'
        '400':
          description: Bad Request - Missing or invalid name parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "Both firstName and lastName must be provided."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Please provide valid authentication credentials."
        '404':
          description: Not Found - No matching customers or IBANs found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
                message: "No customer with the provided name was found."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Please try again later or contact support if the problem persists."
  /bank-accounts:
    get:
      tags:
        - BankAccounts
      summary: Get all bank accounts
      description: Returns a paginated list of all bank accounts in the system. Access | Employee
      operationId: getBankAccounts
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for paginated results. Defaults to 1 if not provided.
          schema:
            type: number
            format: int
            example: 2
        - name: pageSize
          in: query
          required: false
          description: Number of results to return per page. Defaults to 20 if not provided.
          schema:
            type: integer
            format: int
            example: 20
      responses:
        '200':
          description: Successful operation - Bank accounts retrieved
          content:
            application/json:
              schema:
