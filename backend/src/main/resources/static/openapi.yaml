openapi: 3.0.3
info:
  title: MoneyMachine - Project 2.4 (Code Generation)
  description: |

    Welcome to the **MoneyMachine** API. This project was made for the second year **InHolland - code generation course**. This documentation follows the **OpenAPI 3.0 Specification** and was built with a design-first approach.

    ### Key Features:
    * **RESTful Endpoints:** Predictable, resource-oriented URLs.
    * **Secure-by-Design:** All endpoints (except public info) require Authentication.
    * **Consistency:** Standardized error responses (400, 401, 404, 500).
    
    ### Contact & Support:
    For internal development support, contact the Project 2.4 Dev Team
    - [Wessel Beun (729848)](mailto:729848@student.inholland.nl)
    - [Chris Lommerse (728158)](mailto:728158@student.inholland.nl)
    - [Adam Nasser (717582)](mailto:717582@student.inholland.nl)
    - [Menno de Wever (728950)](mailto:728950@student.inholland.nl)

    View our Github Repository: [The MoneyMachine repository](https://github.com/Chris-17Lommerse/MoneyMachine)

  termsOfService: https://swagger.io/terms/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
  - url: https://moneymachine-1ifn.onrender.com/swagger-ui/index.html#/ATM/atmDeposit
    description: Production server (OAS 3.2)
security:
  - bearerAuth: []
tags:
  - name: Users
    description: Operations about user management and authentication
  - name: Transactions
    description: Operations about recording transactions within the application
  - name: BankAccounts
    description: Operations for managing bankaccounts
paths:
  /users:
    get:
      tags:
        - Users
      summary: Get all registered users
      description: Returns a list of registered users. Can be filtered by is approved
      operationId: getUsers
      parameters:
        - name: isApproved
          in: query
          description: Filter by 'approved'
          required: false   
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          description: Get paginated page
          schema:
            type: number
            format: int
            example: 2
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                items: 
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Unauthorized - Authentication required"
                details: "Please provide valid authentication credentials."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Internal Server Error - An unexpected error occurred"
                details: "Please try again later or contact support if the problem persists."
  
    post:
      tags:
        - Users
      summary: Registers an user account
      description: Creates an account for an user 
      security: []
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Users created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad Request - Invalid input parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "Bad Request - Invalid input parameters"
                details: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
                message: "Unauthorized - Authentication required"
                details: "Please provide valid authentication credentials."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                type: INTERNAL_SERVER_ERROR
                message: "Internal Server Error - An unexpected error occurred"
                details: "Please try again later or contact support if the problem persists."
  /users/login:
    post:
      tags:
        - Users
      summary: Logs user into the system.
      description: log user into the system.
      security: []
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
                $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful operation
          headers:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request - Invalid username or password supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 400
                type: BAD_REQUEST
                message: "Bad Request - Invalid input parameters"
                details: "The provided input does not meet the required validation rules."
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 401
                type: UNAUTHORIZED
