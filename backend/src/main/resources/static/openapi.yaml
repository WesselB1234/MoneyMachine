                code: 401
                type: UNAUTHORIZED
                message: "Unauthorized - Authentication required"
                details: "Please provide valid authentication credentials."
        '404':
          description: Not Found - No bank accounts found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                type: NOT_FOUND
