      description: Returns the details of a single bank account identified by its IBAN. Access | User (only own bank accounts) and Employee (all bank accounts)
      operationId: getBankAccountByIban
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the bank account to retrieve
          schema:
            type: string
            example: NL91ABNA0417164300
      responses:
        '200':
          description: Successful operation - Bank account retrieved
          content:
