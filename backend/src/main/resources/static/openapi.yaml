openapi: 3.0.3
info:
  title: MoneyMachine - Project 2.4 (Code Generation)
  description: |

    Welcome to the **MoneyMachine** API. This project was made for the second year **InHolland - code generation course**. This documentation follows the **OpenAPI 3.0 Specification** and was built with a design-first approach.

    ### Key Features:
    * **RESTful Endpoints:** Predictable, resource-oriented URLs.
    * **Secure-by-Design:** All endpoints (except public info) require Authentication.
    * **Consistency:** Standardized error responses (400, 401, 404, 500).
    
    ### Contact & Support:
    For internal development support, contact the Project 2.4 Dev Team
    - [Wessel Beun (729848)](mailto:729848@student.inholland.nl)
    - [Chris Lommerse (728158)](mailto:728158@student.inholland.nl)
    - [Adam Nasser (717582)](mailto:717582@student.inholland.nl)
    - [Menno de Wever (728950)](mailto:728950@student.inholland.nl)

    View our Github Repository: [The MoneyMachine repository](https://github.com/Chris-17Lommerse/MoneyMachine)

  termsOfService: https://swagger.io/terms/
