  /transactions/withdraw:
    post:
      tags:
        - Transactions
      summary: Withdraw money from a bank account
      description: Withdraws a specified amount from a bank account. The source IBAN is provided in the request body by fromIban. Access | User and Employee
      operationId: Withdraw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
