components:
  schemas:
    UserOverviewDTO:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/UserDTO'
          description: List of user objects

    UserDTO:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          example: john.doe@example.com
        bsn:
          type: string
          example: "123456789"
        phoneNumber:
          type: string
          example: +31612345678
        role:
          type: string
          enum: [customer, employee]
          example: user
        isActive:
          type: boolean
          example: true
        isApproved:
          type: boolean
          example: true

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: "secret123"

    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          example: john.doe@example.com
        bsn:
          type: integer
          example: 123456789
        phoneNumber:
          type: string
          example: +31612345678

    AmountRequest:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          example: 50.00

    ErrorDTO:
      type: object
      required:
        - code
        - type
        - message
      properties:
        code:
          type: integer
        message:
          type: string
          example: "Bad Request - Invalid input parameters"
        details:
          type: string
          example: "The provided input does not meet the required validation rules."

    LoginDTO:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600
        user: 
          $ref: '#/components/schemas/UserSummaryDTO'
        

    UserSummaryDTO:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: "john"
        lastName:
          type: string
          example: "doe"
        email:
          type: string
          example: "user@example.com"
        

    TransactionDTO:
      type: object
      properties:
        transactionId:
          type: integer
          example: 1
        initiatingUserId:
          type: integer
          example: 2
        fromAccountIban: 
          type: string
          example: "NL91ABNA0417164300"
        toAccountIban:
          type: string
          example: "NL91ABNA0417164300"
          description: The IBAN of the account the funds are transferred to
        message:
          type: string
          example: "Bought a car"
          description: Displays why the transaction was done
        amount: 
          type: number
          format: decimal
          example: 21.4
        dateTime: 
          type: string
          format: date-time
          example: "2026-11-24T14:45:12Z"
        isActive: 
          type: boolean
          example: true

    ATMBalanceUpdateDTO:
      type: object
      properties:
        transactionId:
          type: integer
          example: 1
        accountIban: 
          type: string
          example: "NL91ABNA0417164300"
        oldBalance: 
          type: number
          format: decimal
          example: 21.4
        newBalance: 
          type: number
          format: decimal
          example: 21.4
        dateTime: 
          type: string
          format: date-time
          example: "2026-11-24T14:45:12Z"

    TransactionOverviewDTO:
      type: object
      properties:
        transactions:
          type: array
          items: 
            $ref: '#/components/schemas/TransactionDTO'

    BankAccountDTO:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
        userId:
          type: integer
          example: 1
        bankAccountType:
          type: string
          enum: [checking, savings]
          example: checking
        balance:
          type: number
          format: decimal
          example: 1500.00
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
        isActive:
          type: boolean
          example: true

    BankAccountCreationRequest:
      type: object
      required:
        - iban
        - userId
        - bankAccountType
        - balance
        - singleTransferLimit
        - dailyTransferLimit
        - absoluteLimit
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
          description: International Bank Account Number
        userId:
          type: integer
          example: 1
          description: The ID of the user who will own the bank account
        bankAccountType:
          type: string
          enum: [checking, savings]
          example: checking
          description: Type of bank account
        balance:
          type: number
          format: decimal
          example: 1000.00
          description: Initial balance for the account
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
          description: Maximum amount for a single transfer
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
          description: Maximum total amount that can be transferred in a day
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
          description: Absolute limit (overdraft limit) for the account

    BankAccountCreatedDTO:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
        userId:
          type: integer
          example: 1
        bankAccountType:
          type: string
          enum: [checking, savings]
          example: checking
        balance:
          type: number
          format: decimal
          example: 1000.00
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2024-04-28T10:30:00Z"

    DeleteBankAccountRequest:
      type: object
      required:
        - isActive
      properties:
        isActive:
          type: boolean
          example: false
          description: Flag to deactivate (false) or activate (true) the bank account

    TransferLimitRequest:
      type: object
      required:
        - singleTransferLimit
        - dailyTransferLimit
        - absoluteLimit
        - iban
      properties:
        singleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
          description: New maximum amount for a single transfer
        dailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
          description: New maximum total amount that can be transferred in a day
        absoluteLimit:
          type: number
          format: decimal
          example: -1000.00
          description: New absolute limit (overdraft limit) for the account
        iban:
          type: string
          example: NL91ABNA0417164300
          description: International Bank Account Number

    TransferLimitUpdateDTO:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
          description: International Bank Account Number
        userId:
          type: integer
          example: 1
          description: The ID of the user who owns the bank account
        newSingleTransferLimit:
          type: number
          format: decimal
          example: 5000.00
          description: Updated maximum amount for a single transfer
        newDailyTransferLimit:
          type: number
          format: decimal
          example: 10000.00
          description: Updated maximum total amount that can be transferred in a day
        newAbsoluteTransferLimit:
          type: number
          format: decimal
          example: -1000.00
          description: Updated absolute limit (overdraft limit) for the account

    IbanFinderResultDTO:
      type: object
      properties:
        firstName:
          type: string
          example: John
          description: The first name of the account holder
        lastName:
          type: string
          example: Doe
          description: The last name of the account holder
        iban:
          type: string
          example: NL91ABNA0417164300
          description: The IBAN of the bank account belonging to the account holder

    TransferRequest:
      type: object
      required:
        - amount
        - toAccountIBAN
      properties:
        amount:
          type: number
          format: decimal
          example: 100.00
          description: Amount to transfer
        toAccountIBAN:
          type: string
          example: NL91ABNA0417164300
          description: IBAN of the destination account

    TransactionFilterRequest:
      type: object
      properties:
        lessThan:
          type: number
          format: decimal
          example: 500.00
          description: Filter transactions with an amount less than this value
        greaterThan:
          type: number
          format: decimal
          example: 100.00
          description: Filter transactions with an amount greater than this value
        equalTo:
          type: number
          format: decimal
          example: 250.00
          description: Filter transactions with an amount equal to this value
        fromIban:
          type: string
          example: NL91ABNA0417164300
          description: Filter transactions by a specific IBAN by me
        toIban:
          type: string
          example: NL91ABNA0417164300
          description: Filter transactions by a specific IBAN to someone else

    IbanFinderRequest:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
          example: John
          description: The first name of the account holder
        lastName:
          type: string
          example: Doe
          description: The last name of the account holder
      
  securitySchemes:
    bearerAuth:            
      type: http
      scheme: bearer
      bearerFormat: JWT
        