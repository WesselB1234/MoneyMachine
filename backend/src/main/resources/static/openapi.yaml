      tags:
        - Transactions
      summary: Add money to bankaccount
      description: Add money to bank account based on amount
      operationId: Deposit
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the bank account to deposit into
          schema:
            type: string
            example: NL91ABNA0417164300
      requestBody:
        required: true
