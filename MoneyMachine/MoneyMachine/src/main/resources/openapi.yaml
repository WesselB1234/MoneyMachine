openapi: 3.2.0
info:
  title: Free Bank of Haarlem - Project 2.4 (Code Generation)
  description: |

    Welcome to the **Free Bank of Haarlem** API. This project was made for the second year **InHolland - code generation course**. This documentation follows the **OpenAPI 3.0 Specification** and was built with a design-first approach.

    ### Key Features:
    * **RESTful Endpoints:** Predictable, resource-oriented URLs.
    * **Secure-by-Design:** All endpoints (except public info) require Authentication.
    * **Consistency:** Standardized error responses (400, 401, 404, 500).
    
    ### Contact & Support:
    For internal development support, contact the [Project 2.4 Dev Team](mailto:dev@haarlembank.nl).

    Some useful links:
    - [The Bank Project repository](https://github.com/Chris-17Lommerse/Project-Code-Generatie-Bank-Applicatie-van-Chris-Wessel-Menno-en-Adam)
    - [The source API definition for the Bank Project](https://github.com/swagger-api/swagger-petstore/blob/master/src/main/resources/openapi.yaml)
    - [OpenAPI 3.2 Specification](https://spec.openapis.org/oas/v3.2.0.html)

  termsOfService: https://swagger.io/terms/
  contact:
    email: dev@haarlembank.nl
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: https://swagger.io
servers:
  - url: https://petstore32.swagger.io/api/v3
    description: Production server (OAS 3.2)
  - url: https://petstore-staging.swagger.io/api/v3
    description: Staging server
tags:
  - name: user
    summary: User account operations
    description: Operations about user management and authentication
  - name: transaction
    summary: Transaction operations
    description: Operations about recording transactions within the application
  - name: bankAccount
    summary: bankaccount operations
    description: Operations for managing bankaccounts
  - name: ATM
    summary: ATM operations
    description: Operations for withdrawing and depositing money for bankaccounts
paths:
  /user/createWithList:
    post:
      tags:
        - user
      summary: Creates list of users with given input array.
      description: Creates list of users with given input array.
      operationId: createUsersWithListInput
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDTO"
  /user/login:
    get:
      tags:
        - user
      summary: Logs user into the system.
      description: log user into the system.
      operationId: loginUser
      parameters:
        - name: username
          in: query
          description: The user name for login
          required: false
          schema:
            type: string
        - name: password
          in: query
          description: The password for login in clear text
          required: false
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          headers:
            X-Rate-Limit:
              description: calls per hour allowed by the user
              schema:
                type: integer
                format: int32
            X-Expires-After:
              description: date in UTC when token expires
              schema:
                type: string
                format: date-time
          content:
            application/xml:
              schema:
                type: string
            application/json:
              schema:
                type: string
        '400':
          description: Invalid username/password supplied
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDTO"
  /user/logout:
    get:
      tags:
        - user
      summary: Logs out current logged in user session.
      description: Log user out of system.
      operationId: logoutUser
      parameters: []
      responses:
        '200':
          description: successful operation
        default:
          description: successful operation
  /user/{username}:
    get:
      tags:
        - user
      summary: Get user by user name.
      description: Get user details based on username.
      operationId: getUserByName
      parameters:
        - name: username
          in: path
          description: The name that needs to be fetched. Use user1 for testing
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid username supplied
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDTO"
    put:
      tags:
        - user
      summary: Update user.
      description: This can only be done by the logged in user.
      operationId: updateUser
      parameters:
        - name: username
          in: path
          description: name that need to be deleted
          required: true
          schema:
            type: string
      requestBody:
        description: Update an existent user in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: successful operation
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDTO"
    delete:
      tags:
        - user
      summary: Delete user.
      description: This can only be done by the logged in user.
      operationId: deleteUser
      parameters:
        - name: username
          in: path
          description: The name that needs to be deleted
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
        '400':
          description: Invalid username supplied
        '404':
          description: User not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDTO"
  /transactions:
    get:
      tags:
          - transaction
      summary: Get all transactions 
      description: This can only be done by a logged in user with employee rights
  /bankAccounts:
    get:
      tags:
        - bankAccount
      summary: Get all bankaccounts
      description: This can only be viewed by a logged in user with employee rights

  /atm/login:
    post:
      tags:
        - ATM
      summary: Login into ATM account
      description: Gives user access to ATM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ATMLoginDTO'
        '401':
          description: Unauthorized - wrong email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

  /atm/logout:
    post:
      tags:
        - ATM
      summary: Logout ATM
      description: Removes access from ATM
      responses:
        '204':
          description: Successfully logged out
        '401':
          description: Unauthorized - user is not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

  /atm/bankAccounts:
    get:
      tags:
        - ATM
      summary: Get all bankaccounts owned by user
      description: Returns bankaccount selectors that will be placed into the account selection box
      responses:
        '200':
          description: Successfully retrieved bank accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ATMBankAccountSelectorDTO'
        '401':
          description: Unauthorized - user is not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

  /atm/bankAccount/{iban}:
    get:
      tags:
        - ATM
      summary: Gives ATM bankaccount information based on IBan
      description: Gives ATM bankaccount information based on IBan and nothing more
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the bank account to retrieve
          schema:
            type: string
            example: NL91ABNA0417164300
      responses:
        '200':
          description: Successful response with bank account information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ATMBankAccountDTO'

        '400':
          description: Invalid IBAN format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

        '404':
          description: Bank account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

  /atm/withdraw/{iban}:
    post:
      tags:
        - ATM
      summary: Remove money from bankaccount
      description: Remove money from bank account based on amount
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the bank account to withdraw from
          schema:
            type: string
            example: NL91ABNA0417164300
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Successfully withdrawn amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceUpdateDTO'
        '401':
          description: Unauthorized - user is not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'
        '404':
          description: Bank account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

  /atm/deposit/{iban}:
    post:
      tags:
        - ATM
      summary: Add money to bankaccount
      description: Add money to bank account based on amount
      parameters:
        - name: iban
          in: path
          required: true
          description: The IBAN of the bank account to deposit into
          schema:
            type: string
            example: NL91ABNA0417164300
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmountRequest'
      responses:
        '200':
          description: Successfully deposited amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceUpdateDTO'
        '401':
          description: Unauthorized - user is not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'
        '404':
          description: Bank account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDTO'

components:
  schemas:
    bankAccount:
      type: object
      properties:
        iban:
          type: string
          exanples: NLxxINHO0xxxxxxxxx
        accountType:
          type: enum
          examples: [checking, savings]
        accountStatus: 
          type: enum
          examples: [pending, approved]
        balance: 
          type: decimal
          examples: 3.14
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          examples: [10]
        username:
          type: string
          examples: [theUser]
        firstName:
          type: string
          examples: [John]
        lastName:
          type: string
          examples: [James]
        email:
          type: string
          examples: [john@email.com]
        password:
          type: string
          examples: ['12345']
        phone:
          type: string
          examples: ['12345']
        userStatus:
          type: integer
          description: User Status
          format: int32
          examples: [1]
      xml:
        name: user
    UserArray:
      description: List of user object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
        password:
          type: string
          example: "secret123"

    AmountRequest:
      type: object
      properties:
        amount:
          type: number
          format: decimal
          example: 50.00

    ErrorDTO:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: "Example error message"

    BalanceUpdateDTO:
      type: object
      properties:
        newBalance:
          type: number
          format: decimal
          example: 950.00
        amount:
          type: number
          format: decimal
          example: 50.00
        transaction_id:
          type: integer
          example: 123456
        iban:
          type: string
          example: NL91ABNA0417164300

    ATMBankAccountDTO:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
        bankAccountType:
          type: string
          examples: [checking, savings]
        balance:
          type: number
          format: decimal
          example: 1200.50
        dailyWithdrawLimit:
          type: number
          format: decimal
          example: 500.00
        dailyWithdrawLimitRemaining:
          type: number
          format: decimal
          example: 300.00
        absoluteLimit:
          type: number
          format: decimal
          example: -100.00

    ATMBankAccountSelectorDTO:
      type: object
      properties:
        bankAccounts:
          type: array
          items:
            $ref: '#/components/schemas/ATMBankAccountOptionDTO'

    ATMBankAccountOptionDTO:
      type: object
      properties:
        iban:
          type: string
          example: NL91ABNA0417164300
        bankAccountType:
          type: string
          examples: [checking, savings]

    ATMLoginDTO:
      type: object
      properties:
        ATMJWT:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: integer
          example: 3600
        userName:
          type: string
          example: "John Doe"